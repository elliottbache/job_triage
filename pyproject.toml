[build-system]
# Standard build-system requirements as defined by PEP 518
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "job_triage"
version = "0.1.0"
description = "Job triage workflow to help apply for jobs"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "Elliott Bache", email = "elliottbache@gmail.com"}
]
# Define your runtime dependencies here
dependencies = [
    "pydantic>=2.0",
    "anthropic",
    "dotenv",
    "pre-commit",
]

[project.optional-dependencies]
# Define development-only tools here
dev = [
    "black",
    "pytest",
    "mypy",
    "sphinx>=8.0",
    "sphinx-autodoc-typehints",
    "sphinx_rtd_theme",
    "myst-parser>=3.0",
    "pre-commit",
    "ruff==0.14.10",
    "black==25.12.0",  # same as pre-commit
    "isort",
    "mypy==1.13.0",
    "codespell==2.4.1",
    "pytest-cov",

]

[project.scripts]
job_triage = "job_triage.app:main"

[tool.setuptools]
# Tell setuptools that packages live under `src/`
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
job_triage = []

[tool.black]
line-length = 88
target-version = ['py312']

[tool.mypy]
# Plugin required for full Pydantic type support
plugins = ["pydantic.mypy"]
follow_imports = "silent"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
